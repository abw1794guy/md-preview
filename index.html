<!DOCTYPE html>
<html lang="zh-Hant" data-editor-dark="true" data-preview-dark="false">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO ── -->
  <title>MD Preview｜Markdown 即時預覽編輯器</title>
  <meta name="description" content="免安裝的線上 Markdown 編輯器，左右對照即時預覽、匯出 PDF、主題切換、捲軸同步，支援 .md 檔匯入，內容自動儲存於瀏覽器。" />
  <meta name="keywords" content="Markdown, 編輯器, 預覽, PDF匯出, 即時預覽, Markdown editor, online, preview, export PDF" />
  <meta name="author" content="MD Preview" />
  <link rel="canonical" href="https://md-preview.pages.dev/" />

  <!-- ── Open Graph（Facebook / LINE / 社群分享） ── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://md-preview.pages.dev/" />
  <meta property="og:title"       content="MD Preview｜Markdown 即時預覽編輯器" />
  <meta property="og:description" content="免安裝的線上 Markdown 編輯器，左右對照即時預覽、匯出 PDF、主題切換、捲軸同步，支援 .md 檔匯入。" />
  <meta property="og:image"       content="https://md-preview.pages.dev/og-image.png" />
  <meta property="og:locale"      content="zh_TW" />
  <meta property="og:locale:alternate" content="en_US" />

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:url"         content="https://md-preview.pages.dev/" />
  <meta name="twitter:title"       content="MD Preview｜Markdown 即時預覽編輯器" />
  <meta name="twitter:description" content="免安裝的線上 Markdown 編輯器，左右對照即時預覽、匯出 PDF、主題切換。" />
  <meta name="twitter:image"       content="https://md-preview.pages.dev/og-image.png" />

  <!-- ── PWA / 瀏覽器 ── -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <meta name="theme-color" content="#1a2332" />
  <meta name="application-name" content="MD Preview" />
  <meta name="robots" content="index, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="toolbar">
    <h1 class="logo">MD Preview</h1>

    <div class="toolbar-center">
      <div class="btn-group" role="group" aria-label="版面配置">
        <button type="button" id="btn-split" class="btn btn-icon is-active" title="分割視圖">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor" aria-hidden="true">
            <rect x="0" y="0" width="6.5" height="12" rx="1.5"/>
            <rect x="9.5" y="0" width="6.5" height="12" rx="1.5"/>
          </svg>
        </button>
        <button type="button" id="btn-editor-only" class="btn btn-icon" title="專注編輯">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor" aria-hidden="true">
            <rect x="0" y="0" width="10" height="12" rx="1.5"/>
            <rect x="13" y="0" width="3" height="12" rx="1.5" opacity="0.3"/>
          </svg>
        </button>
        <button type="button" id="btn-preview-only" class="btn btn-icon" title="純預覽">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor" aria-hidden="true">
            <rect x="0" y="0" width="3" height="12" rx="1.5" opacity="0.3"/>
            <rect x="6" y="0" width="10" height="12" rx="1.5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="toolbar-actions">
      <button type="button" id="btn-sync" class="btn btn-icon" title="開啟捲軸同步" aria-pressed="false">
        <svg width="13" height="15" viewBox="0 0 13 15" fill="currentColor" aria-hidden="true">
          <path d="M6.5 0L3 4h2.25v3.5h2.5V4H10L6.5 0z"/>
          <path d="M6.5 15L10 11H7.75V7.5h-2.5V11H3L6.5 15z"/>
        </svg>
      </button>
      <button type="button" id="btn-theme" class="btn btn-icon btn-theme-icon" title="切換主題" aria-label="切換主題">
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <circle cx="8" cy="8" r="8" fill="currentColor"/>
          <path d="M8 0a8 8 0 0 1 0 16V0z" fill="#fff" opacity="0.9"/>
        </svg>
        <span id="theme-label" class="theme-label">暗|亮</span>
      </button>
      <button type="button" id="btn-lang" class="btn btn-icon btn-lang" title="Switch to English" aria-label="Switch language">EN</button>
      <div class="toolbar-sep"></div>
      <label class="btn" id="label-import" for="file-input" role="button" tabindex="0" title="匯入 .md 檔（或拖曳到編輯區）">匯入</label>
      <input type="file" id="file-input" accept=".md,.markdown,.txt" hidden />
      <button type="button" id="btn-pdf" class="btn btn-primary">匯出 PDF</button>
      <span class="hint" id="save-status" aria-live="polite"></span>
    </div>
  </header>

  <main class="layout" id="layout">
    <section class="pane pane-editor" id="pane-editor" aria-label="Markdown 編輯">
      <div class="pane-header">
        <span class="pane-title">Markdown</span>
      </div>
      <textarea id="md-input" class="md-input" spellcheck="false" placeholder="在此輸入 Markdown…&#10;&#10;可拖曳 .md 檔到此處匯入"></textarea>
    </section>

    <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="調整寬度"></div>

    <section class="pane pane-preview" id="pane-preview" aria-label="預覽">
      <div class="pane-header">
        <span class="pane-title" id="pane-preview-title">預覽</span>
      </div>
      <div id="preview" class="preview markdown-body"></div>
    </section>
  </main>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "MD Preview",
    "alternateName": "Markdown 即時預覽編輯器",
    "url": "https://md-preview.pages.dev/",
    "description": "免安裝的線上 Markdown 編輯器，左右對照即時預覽、匯出 PDF、主題切換、捲軸同步，支援 .md 檔匯入，內容自動儲存於瀏覽器。",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Any",
    "browserRequirements": "Requires JavaScript",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "TWD" },
    "inLanguage": ["zh-Hant", "en"],
    "featureList": [
      "即時 Markdown 預覽",
      "匯出 PDF",
      "主題切換（深色 / 淺色）",
      "捲軸同步",
      "版面切換",
      "匯入 .md 檔",
      "繁中 / English 介面"
    ]
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
