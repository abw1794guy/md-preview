<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="toolbar">
    <h1 class="logo">MD Preview</h1>
    <div class="toolbar-actions">
      <button type="button" id="btn-pdf" class="btn btn-primary">匯出 PDF</button>
      <span class="hint" id="save-status" aria-live="polite"></span>
    </div>
  </header>

  <main class="layout">
    <section class="pane pane-editor" aria-label="Markdown 編輯">
      <div class="pane-header">
        <span class="pane-title">Markdown</span>
      </div>
      <textarea id="md-input" class="md-input" spellcheck="false" placeholder="在此輸入 Markdown…"></textarea>
    </section>

    <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="調整寬度"></div>

    <section class="pane pane-preview" aria-label="預覽">
      <div class="pane-header">
        <span class="pane-title">預覽</span>
      </div>
      <div id="preview" class="preview markdown-body"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
